name: Alpine Release Build

permissions:
  contents: write

on:
  push:
    tags:
      - 'alpine-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version for test build'
        required: true
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            RAW_VERSION="${{ github.event.inputs.version }}"
            TAG="alpine-test-${RAW_VERSION}"
            PRERELEASE="true"
          else
            RAW_VERSION="${GITHUB_REF_NAME}"
            TAG="${GITHUB_REF_NAME}"
            PRERELEASE="false"
          fi

          VERSION=$(echo "$RAW_VERSION" | sed 's/^alpine-v//; s/^[vV]*//; s/^[[:space:]]*//; s/[[:space:]]*$//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

          echo "Version: $VERSION"
          echo "Tag: $TAG"

  build-binaries:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - name: Build Alpine binary
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          ARCH: ${{ matrix.arch }}
        run: |
          mkdir -p build/alpine
          docker run --rm \
            --platform "linux/${ARCH}" \
            -e VERSION="${VERSION}" \
            -e ARCH="${ARCH}" \
            -v "${PWD}:/src" \
            -w /src \
            alpine:3.20 sh -c '
              set -e
              apk add --no-cache go build-base musl-dev nodejs npm;
              npm --prefix ./front install;
              npm --prefix ./front run build;
              GOOS=linux GOARCH=${ARCH} CGO_ENABLED=1 \
              CFLAGS="-static" \
              go build -C ./server \
              -ldflags="-s -w -linkmode external -extldflags -static" \
              -o ../build/alpine/forward_server_linux_${ARCH}_${VERSION} ./
            '

      - name: Upload Alpine binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: alpine-binary-${{ matrix.arch }}
          path: build/alpine/forward_server_linux_${{ matrix.arch }}_${{ needs.prepare.outputs.version }}
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: [prepare, build-binaries]
    steps:
      - name: Download Alpine binaries
        uses: actions/download-artifact@v4
        with:
          path: build/alpine
          pattern: alpine-binary-*
          merge-multiple: true

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Alpine Release ${{ needs.prepare.outputs.version }}
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
          files: |
            build/alpine/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-alpine:
    runs-on: ubuntu-latest
    needs: [prepare, build-binaries]
    steps:
      - uses: actions/checkout@v4

      - name: Download Alpine binaries
        uses: actions/download-artifact@v4
        with:
          path: scripts/docker
          pattern: alpine-binary-*
          merge-multiple: true

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64

      - name: Build and push Alpine image
        uses: docker/build-push-action@v5
        with:
          context: ./scripts/docker
          file: ./scripts/docker/Dockerfile.alpine
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/clipshare-forward-server:alpine-${{ needs.prepare.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/clipshare-forward-server:${{ needs.prepare.outputs.tag }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
            TARGETOS=linux
